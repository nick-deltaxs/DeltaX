version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: Infra/Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env
    networks:
      - deltax-network

networks:
  deltax-network:
    driver: bridge
