version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: Infra/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../Codebase:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env
    command: npm run dev
    networks:
      - deltax-network

  # Optional: Nginx reverse proxy for production-like setup
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - deltax-network

networks:
  deltax-network:
    driver: bridge
